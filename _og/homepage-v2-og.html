<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Prism AI Analytics — Homepage OG card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:     #17135C;
    --navy-2:   #1E1A6E;
    --navy-3:   #2A2580;
    --royal:    #3A5998;
    --blue:     #4A6DB5;
    --sky:      #BDC9DD;
    --white:    #FFFFFF;
    --gold:     #C8A45A;
    --gold-dk:  #A8883A;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: var(--white);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  /* HERO ground — mirrors production #home */
  .card {
    position: relative;
    width: 1200px; height: 630px;
    padding: 64px 80px 56px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    background: linear-gradient(165deg,
      var(--navy)   0%,
      var(--navy-2) 40%,
      var(--navy-3) 70%,
      var(--royal)  100%);
  }

  /* Ambient radial glows — mirrors .hero-bg-geo */
  .bg-geo {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(ellipse 60% 50% at 78% 50%, rgba(74,109,181,0.32) 0%, transparent 70%),
      radial-gradient(ellipse 30% 40% at 15% 80%, rgba(189,201,221,0.08) 0%, transparent 60%);
  }

  /* Subtle grid — mirrors .hero-grid */
  .bg-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(189,201,221,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(189,201,221,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Prism conic glow — mirrors .hero-prism-glow */
  .bg-prism {
    position: absolute; top: 6%; right: 4%;
    width: 460px; height: 460px; pointer-events: none;
    background: conic-gradient(from 180deg,
      rgba(74,109,181,0.32),
      rgba(200,164,90,0.20),
      rgba(58,89,152,0.24),
      rgba(189,201,221,0.16),
      rgba(74,109,181,0.32));
    border-radius: 50%;
    filter: blur(70px);
  }

  /* Foreground content */
  .content {
    position: relative; z-index: 2;
    display: grid;
    grid-template-rows: auto 1fr auto;
    width: 100%;
    height: 100%;
  }

  /* BRAND row — top-left mark */
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .brand svg.logo {
    width: 56px; height: 44px;
    filter: drop-shadow(0 0 16px rgba(200,164,90,0.35));
  }
  .brand-text {
    display: flex; flex-direction: column; gap: 2px;
  }
  .brand-name {
    font-weight: 700; font-size: 22px; color: var(--white);
    letter-spacing: 0.005em;
  }
  .brand-tag {
    font-weight: 500; font-size: 10.5px;
    color: var(--sky); opacity: 0.85;
    letter-spacing: 0.22em; text-transform: uppercase;
  }

  /* LOCKUP — eyebrow + headline + subhead */
  .lockup {
    align-self: center;
    max-width: 780px;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 14px;
    font-weight: 700; font-size: 14px;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--sky);
    margin: 0 0 24px;
  }
  .eyebrow::before {
    content: ''; display: block;
    width: 36px; height: 2px;
    background: var(--gold); border-radius: 1px;
  }
  .headline {
    font-weight: 800; font-size: 80px;
    line-height: 1.05; letter-spacing: -0.025em;
    color: var(--white);
    margin: 0 0 22px;
  }
  .headline em {
    font-style: italic;
    font-weight: 600;
    background: linear-gradient(135deg, var(--sky), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: transparent;
  }
  .subhead {
    font-weight: 600; font-size: 28px;
    line-height: 1.3; letter-spacing: -0.005em;
    color: var(--sky);
    margin: 0;
    max-width: 720px;
  }
  .subhead .dot {
    color: var(--gold);
    margin: 0 8px;
    font-weight: 800;
  }

  /* FOOTER */
  .foot {
    display: flex; justify-content: space-between; align-items: flex-end;
    color: var(--sky);
    font-size: 16px;
    margin-top: 8px;
  }
  .foot .url {
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--white);
  }
  .foot .loc {
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-size: 11px;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="card">

    <div class="bg-geo"></div>
    <div class="bg-grid"></div>
    <div class="bg-prism"></div>

    <div class="content">

      <div class="brand">
        <svg class="logo" viewBox="0 0 98 77" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="prism-face-left" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%"  stop-color="#C8A45A"/>
              <stop offset="100%" stop-color="#A8883A"/>
            </linearGradient>
            <linearGradient id="prism-face-right" x1="1" y1="0" x2="0" y2="1">
              <stop offset="0%"  stop-color="#A8883A"/>
              <stop offset="100%" stop-color="#6E5A2E"/>
            </linearGradient>
            <linearGradient id="prism-face-front" x1="0.5" y1="0" x2="0.5" y2="1">
              <stop offset="0%"  stop-color="#E0BD78"/>
              <stop offset="100%" stop-color="#C8A45A"/>
            </linearGradient>
          </defs>
          <polygon points="49,4 92,72 6,72" fill="url(#prism-face-front)"/>
          <polygon points="49,4 49,72 6,72"  fill="url(#prism-face-left)" opacity="0.85"/>
          <polygon points="49,4 49,72 92,72" fill="url(#prism-face-right)" opacity="0.95"/>
          <line x1="49" y1="4" x2="49" y2="72" stroke="#F0DEAB" stroke-width="0.6" opacity="0.6"/>
        </svg>
        <div class="brand-text">
          <span class="brand-name">Prism AI Analytics</span>
          <span class="brand-tag">Illuminating Data &middot; Empowering Decisions</span>
        </div>
      </div>

      <div class="lockup">
        <p class="eyebrow">AI Adoption &mdash; Strategy + Execution</p>
        <h1 class="headline"><em>AI adoption,</em> end to end.</h1>
        <p class="subhead">Assess<span class="dot">.</span>Architect<span class="dot">.</span>Operate.</p>
      </div>

      <div class="foot">
        <span class="url">prismaianalytics.com</span>
        <span class="loc">Charlotte &middot; NC</span>
      </div>

    </div>
  </div>
</body>
</html>
