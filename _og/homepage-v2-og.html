<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Prism AI Analytics — Homepage OG card</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,700&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:    #17135C;
    --royal:   #3A5998;
    --sky:     #BDC9DD;
    --offwhite:#F4F7FB;
    --gold:    #C8A45A;
    --gold-dk: #A8883A;
    /* WCAG AA-compliant eyebrow gold on offwhite ground (contrast 5.6:1 vs #F4F7FB) */
    --gold-eyebrow: #7A5F2A;
    --charcoal:#1A1A2E;
    --muted:   #5A6278;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: var(--navy);
    background: var(--offwhite);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  .card {
    position: relative;
    width: 1200px; height: 630px;
    padding: 70px 88px 60px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    background:
      radial-gradient(1100px 700px at 110% -10%, rgba(23,19,92,0.10), transparent 60%),
      radial-gradient(800px 500px at -10% 110%, rgba(200,164,90,0.10), transparent 60%),
      var(--offwhite);
  }

  /* Prism geometric accent — top-right */
  .prism {
    position: absolute;
    right: -60px; top: -40px;
    width: 520px; height: 520px;
    opacity: 0.22;
    pointer-events: none;
  }

  /* Honey accent — top hairline */
  .hairline {
    position: absolute;
    left: 88px; right: 88px; top: 36px;
    height: 2px;
    background: linear-gradient(90deg, var(--gold) 0%, var(--gold) 120px, rgba(200,164,90,0) 320px);
  }

  /* Header — brand mark */
  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }
  .brand-mark {
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 0.18em;
    color: var(--navy);
  }
  .brand-sub {
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Main lockup */
  .lockup {
    align-self: center;
    max-width: 920px;
  }
  .eyebrow {
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold-eyebrow);
    margin: 0 0 26px;
  }
  .headline {
    font-weight: 700;
    font-size: 96px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: var(--navy);
    margin: 0 0 26px;
  }
  .headline em {
    font-style: italic;
    font-weight: 500;
    color: var(--navy);
  }
  .subhead {
    font-weight: 600;
    font-size: 30px;
    line-height: 1.25;
    letter-spacing: -0.005em;
    color: var(--royal);
    margin: 0;
  }
  .subhead .dot {
    color: var(--gold);
    margin: 0 6px;
    font-weight: 700;
  }

  /* Footer */
  .foot {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 18px;
    color: var(--muted);
  }
  .foot .url {
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--navy);
  }
  .foot .loc {
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 13px;
  }
</style>
</head>
<body>
  <div class="card">

    <!-- Geometric prism accent (top-right) -->
    <svg class="prism" viewBox="0 0 520 520" fill="none" aria-hidden="true">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#3A5998" />
          <stop offset="1" stop-color="#17135C" />
        </linearGradient>
        <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#C8A45A" />
          <stop offset="1" stop-color="#17135C" stop-opacity="0" />
        </linearGradient>
      </defs>
      <!-- Triangular prism silhouette: equilateral, base at bottom -->
      <polygon points="260,60 460,400 60,400" stroke="url(#g1)" stroke-width="2.5" fill="none"/>
      <polygon points="260,60 460,400 60,400" stroke="#17135C" stroke-width="1" fill="rgba(189,201,221,0.08)"/>
      <!-- Inner refraction lines -->
      <line x1="260" y1="60"  x2="260" y2="400" stroke="#3A5998" stroke-width="1" opacity="0.55"/>
      <line x1="170" y1="230" x2="350" y2="230" stroke="url(#g2)" stroke-width="1" opacity="0.65"/>
      <!-- Beam (incoming) -->
      <line x1="-10" y1="180" x2="170" y2="230" stroke="#17135C" stroke-width="1.3"/>
      <!-- Beams (outgoing — spectrum) -->
      <line x1="350" y1="230" x2="540" y2="170" stroke="#C8A45A" stroke-width="1.3"/>
      <line x1="350" y1="230" x2="540" y2="210" stroke="#A8883A" stroke-width="1.1" opacity="0.85"/>
      <line x1="350" y1="230" x2="540" y2="250" stroke="#3A5998" stroke-width="1.1" opacity="0.8"/>
      <line x1="350" y1="230" x2="540" y2="290" stroke="#17135C" stroke-width="1.1" opacity="0.7"/>
    </svg>

    <div class="hairline"></div>

    <!-- Brand mark -->
    <div class="brand">
      <span class="brand-mark">PRISM</span>
      <span class="brand-sub">AI Analytics</span>
    </div>

    <!-- Main lockup -->
    <div class="lockup">
      <p class="eyebrow">AI Adoption &mdash; Strategy + Execution</p>
      <h1 class="headline"><em>AI adoption,</em> end to end.</h1>
      <p class="subhead">Assess<span class="dot">.</span>Architect<span class="dot">.</span>Operate.</p>
    </div>

    <!-- Footer -->
    <div class="foot">
      <span class="url">prismaianalytics.com</span>
      <span class="loc">Charlotte &middot; NC</span>
    </div>

  </div>
</body>
</html>
